    <script>
      function showDiagnosticError(message, stack) {
        document.getElementById('error-message').textContent = message;
        document.getElementById('error-stack').textContent = stack || 'No stack trace available';
        document.getElementById('error-overlay').style.display = 'block';
      }
      window.addEventListener('error', function(e) {
        showDiagnosticError(e.message + ' (at ' + e.filename + ':' + e.lineno + ')', e.error ? e.error.stack : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        showDiagnosticError('Unhandled Promise Rejection: ' + e.reason, e.reason && e.reason.stack ? e.reason.stack : '');
      });
    </script>
